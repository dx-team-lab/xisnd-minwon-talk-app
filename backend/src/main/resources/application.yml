spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/minwon_platform?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  # .env 의 JWT_SECRET 에서 주입 (Base64 인코딩된 HMAC-SHA 키). 코드에 절대 하드코딩 금지.
  secret: ${JWT_SECRET}
  # Access Token 만료시간: 3600000ms = 1시간
  access-token-expiration-ms: 3600000

cors:
  # 허용 Origin 목록. 여러 개는 쉼표 구분: "http://localhost:3000,https://prod.example.com"
  # 운영 배포 시 .env 의 CORS_ALLOWED_ORIGINS 에 실제 도메인을 설정한다.
  # allowedOrigins("*") 절대 사용 금지.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    root: INFO
    com.minwon.platform: DEBUG
